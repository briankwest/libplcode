name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-arm64-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build .deb packages (arm64 Ubuntu 24.04)
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: aarch64
          distro: ubuntu24.04
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${{ github.workspace }}:/workspace"
          run: |
            cd /workspace
            apt-get update
            apt-get install -y build-essential devscripts debhelper fakeroot autoconf automake libtool
            dpkg-buildpackage -us -uc -b
            mkdir -p /workspace/dist
            cp ../*.deb ../*.ddeb /workspace/dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-arm64-ubuntu
          path: dist/*

  build-arm64-debian12:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build .deb packages (arm64 Debian 12)
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: aarch64
          distro: bookworm
          githubToken: ${{ github.token }}
          dockerRunArgs: --volume "${{ github.workspace }}:/workspace"
          run: |
            cd /workspace
            apt-get update
            apt-get install -y build-essential devscripts debhelper fakeroot autoconf automake libtool
            dpkg-buildpackage -us -uc -b
            mkdir -p /workspace/dist
            cp ../*.deb ../*.ddeb /workspace/dist/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-arm64-debian12
          path: dist/*

  build-arm64-debian13:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"

      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build .deb packages (arm64 Debian 13)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            debian:trixie bash -c '
              cd /workspace
              apt-get update
              apt-get install -y build-essential devscripts debhelper fakeroot autoconf automake libtool
              dpkg-buildpackage -us -uc -b
              mkdir -p /workspace/dist
              cp ../*.deb ../*.ddeb /workspace/dist/ 2>/dev/null || true
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-arm64-debian13
          path: dist/*

  build-amd64-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper fakeroot lintian autoconf automake libtool

      - name: Build .deb packages (amd64 Ubuntu 24.04)
        run: |
          scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"
          dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb ../*.ddeb dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-amd64-ubuntu
          path: dist/*

  build-amd64-debian12:
    runs-on: ubuntu-24.04
    container:
      image: debian:bookworm
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: apt-get install -y build-essential devscripts debhelper fakeroot autoconf automake libtool

      - name: Build .deb packages (amd64 Debian 12)
        run: |
          scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"
          dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb ../*.ddeb dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-amd64-debian12
          path: dist/*

  build-amd64-debian13:
    runs-on: ubuntu-24.04
    container:
      image: debian:trixie
    steps:
      - name: Install git
        run: apt-get update && apt-get install -y git

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: apt-get install -y build-essential devscripts debhelper fakeroot autoconf automake libtool

      - name: Build .deb packages (amd64 Debian 13)
        run: |
          scripts/generate-changelog.sh "${GITHUB_REF_NAME#v}"
          dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp ../*.deb ../*.ddeb dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: debs-amd64-debian13
          path: dist/*

  create-release:
    needs: [build-arm64-ubuntu, build-arm64-debian12, build-arm64-debian13, build-amd64-ubuntu, build-amd64-debian12, build-amd64-debian13]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten and rename with distro suffix
        run: |
          mkdir -p dist
          for dir in artifacts/debs-*/; do
            distro=$(basename "$dir" | sed 's/debs-//')
            for f in "$dir"*.deb "$dir"*.ddeb; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              ext="${base##*.}"
              name="${base%.*}"
              cp "$f" "dist/${name}~${distro}.${ext}"
            done
          done
          ls -lh dist/

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          [ -z "$PREV_TAG" ] && PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          echo "## libplcode ${GITHUB_REF_NAME}" > notes.md
          echo "" >> notes.md
          git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" >> notes.md
          echo "" >> notes.md
          echo "" >> notes.md
          echo "### Build Matrix" >> notes.md
          echo "| Architecture | OS |" >> notes.md
          echo "|-|-|" >> notes.md
          echo "| amd64 | Ubuntu 24.04 |" >> notes.md
          echo "| amd64 | Debian 12 (Bookworm) |" >> notes.md
          echo "| amd64 | Debian 13 (Trixie) |" >> notes.md
          echo "| arm64 | Ubuntu 24.04 |" >> notes.md
          echo "| arm64 | Debian 12 (Bookworm) |" >> notes.md
          echo "| arm64 | Debian 13 (Trixie) |" >> notes.md
          echo "" >> notes.md
          echo "### Packages" >> notes.md
          echo "| File | Size |" >> notes.md
          echo "|------|------|" >> notes.md
          for f in dist/*.deb dist/*.ddeb; do
            [ -f "$f" ] || continue
            echo "| \`$(basename $f)\` | $(du -h "$f" | cut -f1) |" >> notes.md
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: |
            dist/*.deb
            dist/*.ddeb
          draft: false
          prerelease: false
